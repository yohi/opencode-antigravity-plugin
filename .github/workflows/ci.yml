name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '**'

jobs:
  verify:
    runs-on: ubuntu-slim
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@883057165b84437a107f06211f2e14e97f00d059 # v5.1.0
        with:
          enable-cache: true
          version: "0.1.41"

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.3.0
        with:
          python-version: "3.13"

      - name: Install pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fb5743d # v4.0.0
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@1d96c772d19495a3b5c517cd2bc0cb401ea0529f # v4.1.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: |
          uv sync --frozen
          pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm verify
