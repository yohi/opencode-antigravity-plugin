name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '**'
  schedule:
    - cron: '0 18 * * *'   # JST 03:00 / UTC 18:00
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-slim
    timeout-minutes: 15

    env:
      OAG_BACKEND_MODE: mock
      ANTIGRAVITY_MODEL: gemini-2.5-pro
      OAG_REQUEST_TIMEOUT_MS: "60000"
      OAG_STREAM_IDLE_TIMEOUT_MS: "30000"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5.1.0
        with:
          enable-cache: true
          version: "0.11.15"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.3.0
        with:
          python-version: "3.13"

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4.0.0
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.1.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: |
          uv sync --frozen
          pnpm install --frozen-lockfile

      - name: Verify (lint + python tests + ts tests, mock mode)
        run: uv run pnpm verify

  live-nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-slim
    timeout-minutes: 20

    env:
      OAG_BACKEND_MODE: live
      ANTIGRAVITY_MODEL: gemini-2.5-pro
      OAG_REQUEST_TIMEOUT_MS: "60000"
      OAG_STREAM_IDLE_TIMEOUT_MS: "30000"
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Skip when secret unavailable
        id: gate
        run: |
          set -euo pipefail
          if [ -z "${GEMINI_API_KEY:-}" ]; then
            echo "GEMINI_API_KEY not configured; skipping live job"
            echo "skip=true" >> "${GITHUB_OUTPUT}"
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout
        if: steps.gate.outputs.skip == 'false'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Install uv
        if: steps.gate.outputs.skip == 'false'
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5.1.0
        with:
          enable-cache: true
          version: "0.11.15"

      - name: Set up Python
        if: steps.gate.outputs.skip == 'false'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.3.0
        with:
          python-version: "3.13"

      - name: Install pnpm
        if: steps.gate.outputs.skip == 'false'
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4.0.0
        with:
          version: 9

      - name: Set up Node.js
        if: steps.gate.outputs.skip == 'false'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.1.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies (including live extras)
        if: steps.gate.outputs.skip == 'false'
        run: |
          uv sync --frozen --extra live
          pnpm install --frozen-lockfile

      - name: Live E2E (real Gemini API)
        if: steps.gate.outputs.skip == 'false'
        run: uv run pnpm test:e2e:live
